<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>محاسبه نمره نهایی</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }
    .app-container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 32px 32px 24px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      padding: 20px 16px 30px;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #1e293b;
      text-align: center;
      margin: 0 0 8px 0;
      letter-spacing: -0.02em;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 28px;
      font-size: 1.1rem;
      border-bottom: 2px solid #e9eef2;
      padding-bottom: 18px;
    }
    .subjects-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }
    .subject-card {
      background: #f8fafc;
      border-radius: 24px;
      padding: 16px 18px;
      border: 1px solid #e2e8f0;
      transition: background 0.1s;
      touch-action: pan-y;
    }
    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .subject-name {
      font-size: 1.35rem;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.4;
    }
    .subject-max {
      background: #dbeafe;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #1e40af;
      white-space: nowrap;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .slider-container {
      flex: 3;
      min-width: 160px;
    }
    input[type=range] {
      width: 100%;
      height: 44px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      touch-action: pan-y;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 10px;
      background: #e0e7ff;
      border-radius: 20px;
      border: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 30px;
      height: 30px;
      background: #2563eb;
      border-radius: 30px;
      margin-top: -10px;
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
      border: 3px solid white;
      cursor: pointer;
      transition: 0.1s;
    }
    input[type=range]::-moz-range-track {
      height: 10px;
      background: #e0e7ff;
      border-radius: 20px;
    }
    input[type=range]::-moz-range-thumb {
      width: 30px;
      height: 30px;
      background: #2563eb;
      border-radius: 30px;
      border: 3px solid white;
      cursor: pointer;
    }
    .percent-value {
      flex: 0 0 70px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      background: white;
      padding: 8px 0;
      border-radius: 40px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .score-badge {
      flex: 0 0 auto;
      background: #cbd5e1;
      color: #0f172a;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 600;
      background: #d9f0d9;
      min-width: 80px;
      text-align: center;
    }
    .footer-total {
      background: #1e293b;
      color: white;
      border-radius: 32px;
      padding: 24px 22px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      bottom: 10px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 1.4rem;
      font-weight: 500;
    }
    .total-score {
      font-size: 2.2rem;
      font-weight: 800;
      background: #0f172a;
      padding: 8px 22px;
      border-radius: 60px;
      color: #facc15;
    }
    .percentage-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.25rem;
      background: #334155;
      padding: 14px 18px;
      border-radius: 30px;
    }
    .final-percent {
      font-weight: 800;
      font-size: 1.9rem;
      color: #a5f3fc;
    }
    .reset-btn {
      background: #f1f5f9;
      border: none;
      color: #0f172a;
      padding: 16px 22px;
      font-size: 1.3rem;
      font-weight: 600;
      border-radius: 60px;
      width: 100%;
      margin-top: 12px;
      transition: 0.15s;
      touch-action: manipulation;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #cbd5e1;
    }
    .reset-btn:active {
      background: #e2e8f0;
      transform: scale(0.98);
    }
    small.note {
      display: block;
      text-align: center;
      color: #64748b;
      margin-top: 25px;
      font-size: 0.9rem;
    }
    /* minor touch tweak */
    @media (max-width: 420px) {
      .subject-name { font-size: 1.2rem; }
      .percent-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>📊 نمره نهایی</h1>
  <div class="subtitle">درصد هر درس را وارد کنید</div>

  <div id="subjectsContainer" class="subjects-list">
    <!-- dynamic subjects injected via js -->
  </div>

  <div class="footer-total">
    <div class="total-row">
      <span>🌟 نمره کل</span>
      <span class="total-score" id="totalAchieved">0.0</span>
    </div>
    <div class="percentage-row">
      <span>📈 درصد کل</span>
      <span class="final-percent" id="totalPercent">0%</span>
    </div>
    <button class="reset-btn" id="resetAll">🔄 تنظیم مجدد (صفر کردن)</button>
  </div>
  <small class="note">از لغزنده‌ها برای تنظیم درصد هر درس استفاده کنید</small>
</div>

<script>
  (function() {
    // ----- لیست دروس با نمره کامل (بر اساس متن داده شده) -----
    const subjects = [
      { name: 'آناتومی', max: 33 },
      { name: 'جنین', max: 7 },
      { name: 'بافت', max: 10 },
      { name: 'فیزیولوژی', max: 34 },
      { name: 'بیوشیمی', max: 20 },
      { name: 'ایمنی', max: 8 },
      { name: 'باکتری', max: 15 },
      { name: 'ویروس', max: 5 },
      { name: 'قارچ', max: 5 },
      { name: 'انگل', max: 9 },
      { name: 'حشره', max: 2 },
      { name: 'اپید', max: 8 },
      { name: 'اصول', max: 12 },
      { name: 'زبان', max: 20 },
      { name: 'معارف', max: 10 }
    ];

    // محاسبه مجموع نمرات کل (برای استفاده)
    const TOTAL_MAX = subjects.reduce((acc, subj) => acc + subj.max, 0); // = 198

    // عناصر DOM
    const container = document.getElementById('subjectsContainer');
    const totalAchievedSpan = document.getElementById('totalAchieved');
    const totalPercentSpan = document.getElementById('totalPercent');

    // آرایه برای نگهداری مقادیر لغزنده‌ها (برای محاسبه سریع)
    let percentValues = new Array(subjects.length).fill(25);

    // تابع به‌روزرسانی کل نمره و درصد
    function updateTotal() {
      let totalAchieved = 0;
      for (let i = 0; i < subjects.length; i++) {
        const maxScore = subjects[i].max;
        const percent = percentValues[i];
        totalAchieved += (percent / 100) * maxScore;
      }
      // گرد کردن به عدد صحیح
      totalAchieved = Math.round(totalAchieved);
      const overallPercent = (totalAchieved / TOTAL_MAX) * 100;
      const percentDisplay = overallPercent.toFixed(1) + '%';

      totalAchievedSpan.innerText = totalAchieved;
      totalPercentSpan.innerText = percentDisplay;
    }

    // ایجاد کارت هر درس و درج در DOM
    function buildUI() {
      container.innerHTML = ''; // پاک کردن placeholder

      subjects.forEach((subject, index) => {
        const card = document.createElement('div');
        card.className = 'subject-card';

        // هدر: نام درس و نمره کامل
        const headerDiv = document.createElement('div');
        headerDiv.className = 'subject-header';
        headerDiv.innerHTML = `
          <span class="subject-name">${subject.name}</span>
          <span class="subject-max">نمره کامل: ${subject.max}</span>
        `;

        // ردیف کنترل: لغزنده، نمایش درصد، نمره کسب شده
        const controlRow = document.createElement('div');
        controlRow.className = 'control-row';

        // لغزنده
        const sliderDiv = document.createElement('div');
        sliderDiv.className = 'slider-container';
        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = 0;
        slider.max = 100;
        slider.value = 25;
        slider.step = 1;
        slider.setAttribute('aria-label', `درصد درس ${subject.name}`);

        // نمایش درصد
        const percentSpan = document.createElement('span');
        percentSpan.className = 'percent-value';
        percentSpan.id = `percent_${index}`;
        percentSpan.innerText = '0%';

        // نمره کسب شده
        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'score-badge';
        scoreSpan.id = `score_${index}`;
        scoreSpan.innerText = '0.0';

        // چیدمان
        sliderDiv.appendChild(slider);
        controlRow.appendChild(sliderDiv);
        controlRow.appendChild(percentSpan);
        controlRow.appendChild(scoreSpan);

        card.appendChild(headerDiv);
        card.appendChild(controlRow);
        container.appendChild(card);

        // ذخیره مرجع لغزنده برای رویداد
        slider.dataset.index = index;

        // تابع به‌روزرسانی برای این سطر
        function updateRowFromSlider() {
          const idx = parseInt(slider.dataset.index);
          const val = parseInt(slider.value, 10);
          percentValues[idx] = val;

          // نمایش درصد
          percentSpan.innerText = val + '%';

          // محاسبه نمره این درس (گرد شده به عدد صحیح)
          const earned = (val / 100) * subjects[idx].max;
          const earnedRounded = Math.round(earned);
          scoreSpan.innerText = earnedRounded;

          // به‌روزرسانی کل
          updateTotal();
        }

        // اتصال رویدادها (برای touch و mouse)
        slider.addEventListener('input', updateRowFromSlider);
        // همچنین برای اطمینان در مرورگرهای قدیمی
        slider.addEventListener('change', updateRowFromSlider);

        // مقداردهی اولیه
        percentValues[index] = 25;
        percentSpan.innerText = '25%';
        scoreSpan.innerText = Math.round((25 / 100) * subject.max);
      });

      // بعد از ساخت، کل را به‌روز کن
      updateTotal();
    }

    // دکمه ریست
    document.getElementById('resetAll').addEventListener('click', function() {
      // ریست تمام لغزنده‌ها به 25%
      const sliders = document.querySelectorAll('input[type=range]');
      sliders.forEach((slider, idx) => {
        slider.value = 25;
        // به‌روزرسانی نمایش درصد و نمره آن سطر
        const percentSpan = document.getElementById(`percent_${idx}`);
        const scoreSpan = document.getElementById(`score_${idx}`);
        if (percentSpan) percentSpan.innerText = '25%';
        if (scoreSpan) scoreSpan.innerText = Math.round((25 / 100) * subjects[idx].max);
        percentValues[idx] = 25;
      });
      updateTotal();
    });

    // شروع: ساختن رابط کاربری
    buildUI();
  })();
</script>
</body>
</html>
